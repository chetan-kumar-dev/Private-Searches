<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Question</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="https://icons.veryicon.com/png/o/miscellaneous/prototyping-tool/search-bar-01.png" type="image/x-icon">
</head>
<body>
    <form action="https://www.amazon.in/s?k">
        <div>
            <ul>
                <li>Amazon Search</li>
            </ul>
            <img height="11" src="https://upload.wikimedia.org/wikipedia/commons/d/de/Amazon_icon.png" alt="Amazon">
            <input type="text" placeholder="Search Amazon" name="k">
            <button>Search</button>
        </div>
    </form>

    <form action="https://www.flipkart.com/search?q">
        <div>
            <ul>
                <li>Flipkart Search</li>
            </ul>
            <img height="11" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRt6Q3ZIJng5i0AeSxxEB9vbFt6xa_AspbNduq-zureZw&s=10" alt="flipkart">
            <input type="text" placeholder="Search Flipkart" name="q">
            <button>Search</button>
        </div>
    </form>

    <form action="https://www.google.com/search?">
        <div>
            <ul>
                <li>Google Search</li>
            </ul>
            <img height="11" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS6U4pRN-hmnCKRp5bBpsxjHfbbutWDEgFRUo0YrTP2ag&s=10" alt="Google">
            <input type="text" placeholder="Search Google" name="q">
            <button>Search</button>
        </div>
    </form>

    <form action="https://www.meesho.com/search?">
        <div>
            <ul>
                <li>Meesho Search</li>
            </ul>
            <img height="11" src="https://upload.wikimedia.org/wikipedia/commons/3/33/Meesho_logo.png" alt="Meesho">
            <input type="text" placeholder="Search Meesho" name="q">
            <button>Search</button>
        </div>
    </form>
</body>
</html>
